<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIE Matrix · Arlena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..800;1,6..72,300..800&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5ede1;
  --bg-alt: #ede2d0;
  --paper: #faf3e6;
  --paper-edge: #e8dcc6;
  --ink: #2c1f1a;
  --ink-soft: #6b5b52;
  --ink-faint: #998477;
  --accent: #8b3a4e;
  --accent-soft: #c97487;
  --accent-bg: rgba(139, 58, 78, 0.06);
  --gold: #b8895a;
  --border: #d9c8a8;
  --border-soft: #e5d5b8;
  --shadow: 0 1px 0 rgba(44, 31, 26, 0.04), 0 4px 16px rgba(44, 31, 26, 0.06);
  --shadow-strong: 0 2px 0 rgba(44, 31, 26, 0.06), 0 12px 32px rgba(44, 31, 26, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 0%, rgba(184, 137, 90, 0.06), transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(139, 58, 78, 0.04), transparent 50%);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(245, 237, 225, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-soft);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  gap: 32px;
}

.brand {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--ink);
  white-space: nowrap;
  font-variation-settings: "opsz" 144;
}
.brand em {
  font-style: italic;
  color: var(--accent);
  font-weight: 400;
}
.brand-tag {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 4px;
}

.search-wrap {
  flex: 1;
  max-width: 480px;
  position: relative;
}
.search-input {
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 11px 16px 11px 40px;
  border-radius: 0;
  transition: all 0.2s;
}
.search-input:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}
.search-input::placeholder { color: var(--ink-faint); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  pointer-events: none;
  color: var(--ink-faint);
}
.search-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--ink-faint);
  padding: 6px;
  display: none;
  font-size: 16px;
  line-height: 1;
}
.search-clear.visible { display: block; }
.search-clear:hover { color: var(--accent); }

.kbd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  padding: 3px 6px;
  border-radius: 3px;
  color: var(--ink-soft);
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}
.search-input:focus + .kbd,
.search-input:not(:placeholder-shown) + .kbd { display: none; }

/* ===== TABS ===== */
.tabs-wrap {
  border-bottom: 1px solid var(--border-soft);
  background: rgba(250, 243, 230, 0.6);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }

.tabs {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  gap: 4px;
}

.tab {
  background: none;
  border: none;
  color: var(--ink-soft);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 16px 18px;
  cursor: pointer;
  white-space: nowrap;
  position: relative;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 14px;
  right: 14px;
  height: 2px;
  background: var(--accent);
}
.tab-emoji { font-size: 14px; }
.tab-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  background: var(--bg-alt);
  padding: 2px 6px;
  border-radius: 8px;
  margin-left: 2px;
}
.tab.active .tab-count {
  background: var(--accent-bg);
  color: var(--accent);
}

/* ===== MAIN ===== */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 40px 80px;
}

.tab-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 16px;
}

.tab-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 44px;
  line-height: 1.1;
  letter-spacing: -0.025em;
  color: var(--ink);
  font-variation-settings: "opsz" 144;
}
.tab-title em {
  font-style: italic;
  color: var(--accent);
}

.tab-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  text-transform: uppercase;
}
.tab-meta strong {
  color: var(--ink);
  font-weight: 500;
}

/* ===== TOOLBAR ===== */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
  padding: 12px 16px;
  background: var(--paper);
  border: 1px solid var(--border-soft);
  flex-wrap: wrap;
}
.toolbar-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.sort-select {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  padding: 6px 24px 6px 10px;
  cursor: pointer;
  border-radius: 0;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b5b52' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
  background-repeat: no-repeat;
  background-position: right 6px center;
  background-size: 14px;
}
.sort-select:focus { outline: none; border-color: var(--accent); }

.sort-direction {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  cursor: pointer;
  letter-spacing: 0.05em;
}
.sort-direction:hover { border-color: var(--accent); color: var(--accent); }

.spacer { flex: 1; }

.result-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.05em;
}
.result-count strong {
  color: var(--accent);
  font-weight: 500;
}

/* ===== CARD GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 18px;
}

.card {
  background: var(--paper);
  border: 1px solid var(--border-soft);
  padding: 22px 24px;
  position: relative;
  transition: all 0.25s cubic-bezier(.22,.61,.36,1);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  min-height: 200px;
  box-shadow: var(--shadow);
}
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.25s;
}
.card:hover {
  border-color: var(--border);
  transform: translateY(-1px);
  box-shadow: var(--shadow-strong);
}
.card:hover::before { opacity: 1; }
.card.expanded {
  grid-column: 1 / -1;
  max-width: 800px;
}
.card.expanded::before { opacity: 1; background: var(--accent); }

.card-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 4px;
  font-variation-settings: "opsz" 144;
}
.card-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}

.card-fields {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.field {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 12px;
  align-items: start;
  font-size: 13px;
  line-height: 1.5;
}
.field-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  padding-top: 2px;
}
.field-value {
  color: var(--ink);
  word-break: break-word;
}

/* Special highlight for "Notes" field */
.field.is-notes {
  grid-template-columns: 1fr;
  gap: 8px;
  margin-top: 8px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.field.is-notes .field-label {
  color: var(--gold);
}
.field.is-notes .field-value {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-style: italic;
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
}

/* Memorized state */
.field.is-memorized .field-value {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.memorized-yes {
  color: #5d7a3e;
  font-weight: 500;
}
.memorized-no {
  color: var(--ink-faint);
}

/* Highlight search matches */
mark {
  background: rgba(184, 137, 90, 0.25);
  color: inherit;
  padding: 1px 2px;
  border-radius: 2px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-faint);
}
.empty-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 300;
  color: var(--ink-soft);
  margin-bottom: 8px;
}
.empty-sub {
  font-size: 13px;
}

/* Loading state */
.loading {
  text-align: center;
  padding: 100px 20px;
  color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Error state */
.error {
  background: var(--paper);
  border-left: 3px solid var(--accent);
  padding: 24px 28px;
  margin: 40px 0;
}
.error h3 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 8px;
}
.error p { margin-bottom: 8px; font-size: 14px; line-height: 1.6; }
.error code {
  background: var(--bg-alt);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

/* ===== FOOTER ===== */
footer {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 40px 48px;
  border-top: 1px solid var(--border-soft);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header-inner { padding: 16px 20px; gap: 16px; flex-wrap: wrap; }
  .brand { font-size: 24px; }
  .tabs { padding: 0 20px; }
  main { padding: 24px 20px 60px; }
  .tab-title { font-size: 32px; }
  .grid { grid-template-columns: 1fr; gap: 14px; }
  .card { padding: 18px 20px; }
  .card-title { font-size: 19px; }
  .field { grid-template-columns: 88px 1fr; gap: 10px; font-size: 12px; }
  .toolbar { padding: 10px 12px; gap: 8px; }
  footer { padding: 24px 20px 40px; flex-direction: column; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div>
      <div class="brand">Arlena's <em>SIE</em> Matrix</div>
      <span class="brand-tag">Personal Reference · 2026</span>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="search" class="search-input" placeholder="Search this tab..." autocomplete="off">
      <span class="kbd">/</span>
      <button class="search-clear" id="searchClear" title="Clear (Esc)">×</button>
    </div>
  </div>
</header>

<div class="tabs-wrap">
  <nav class="tabs" id="tabs"></nav>
</div>

<main id="main">
  <div class="loading">Loading reference...</div>
</main>

<footer>
  <span>SIE Reference · Personal Study Material</span>
  <span>Press <strong>/</strong> to search · <strong>1-7</strong> for tabs</span>
</footer>

<script>
// ============================================================
// Configuration: tab order + emoji mapping
// ============================================================
const TAB_CONFIG = [
  { key: 'Products',           emoji: '📊', label: 'Products' },
  { key: 'Regs & Acts',        emoji: '⚖️', label: 'Regs & Acts' },
  { key: 'Numbers',            emoji: '🔢', label: 'Numbers' },
  { key: 'Account Types',      emoji: '👥', label: 'Account Types' },
  { key: 'Options',            emoji: '📈', label: 'Options' },
  { key: 'Formulas',           emoji: '📐', label: 'Formulas' },
  { key: 'Regulatory Bodies',  emoji: '🏛️', label: 'Authorities', altKey: 'Authorities' },
];

let DATA = null;
let state = {
  activeTab: TAB_CONFIG[0].key,
  query: '',
  sortBy: null,
  sortDir: 'asc',
  expandedRowId: null,
};

// ============================================================
// Fetch data
// ============================================================
async function loadData() {
  try {
    const res = await fetch('./sie_data.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    init();
  } catch (err) {
    showError(err);
  }
}

function showError(err) {
  document.getElementById('main').innerHTML = `
    <div class="error">
      <h3>Couldn't load sie_data.json</h3>
      <p>Make sure <code>sie_data.json</code> is in the same folder as this HTML file.</p>
      <p style="color: var(--ink-faint); font-size: 12px;">Technical detail: ${err.message}</p>
      <p style="margin-top:16px;">If you're opening this file locally by double-clicking, browser security prevents loading JSON. Either deploy to GitHub Pages, or run a local server: <code>python -m http.server</code> in the folder.</p>
    </div>
  `;
}

// ============================================================
// Tabs
// ============================================================
function renderTabs() {
  const nav = document.getElementById('tabs');
  nav.innerHTML = TAB_CONFIG.map((t, i) => {
    const data = DATA[t.key] || DATA[t.altKey];
    const count = data ? data.rows.length : 0;
    const isActive = (state.activeTab === t.key) || (state.activeTab === t.altKey);
    return `
      <button class="tab ${isActive ? 'active' : ''}" data-tab="${t.key}" title="Press ${i + 1}">
        <span class="tab-emoji">${t.emoji}</span>
        <span>${t.label}</span>
        <span class="tab-count">${count}</span>
      </button>
    `;
  }).join('');
  nav.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      state.activeTab = el.dataset.tab;
      state.query = '';
      document.getElementById('search').value = '';
      document.getElementById('searchClear').classList.remove('visible');
      state.sortBy = null;
      state.expandedRowId = null;
      render();
    });
  });
}

// ============================================================
// Get current tab data (handles renamed tabs)
// ============================================================
function getCurrentData() {
  const config = TAB_CONFIG.find(t => t.key === state.activeTab || t.altKey === state.activeTab);
  if (!config) return null;
  const data = DATA[config.key] || DATA[config.altKey];
  return { config, data };
}

// ============================================================
// Render main content
// ============================================================
function render() {
  renderTabs();
  const ctx = getCurrentData();
  if (!ctx || !ctx.data) {
    document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-title">No data for this tab.</div></div>';
    return;
  }

  const { config, data } = ctx;
  const filtered = filterAndSort(data.rows, data.columns);

  const html = `
    <div class="tab-header">
      <h1 class="tab-title">${config.label.includes(' ') ? config.label.split(' ')[0] + ' <em>' + config.label.split(' ').slice(1).join(' ') + '</em>' : '<em>' + config.label + '</em>'}</h1>
      <div class="tab-meta">
        ${data.columns.length} <strong>FIELDS</strong> · ${data.rows.length} <strong>ENTRIES</strong>
      </div>
    </div>

    <div class="toolbar">
      <span class="toolbar-label">Sort by</span>
      <select class="sort-select" id="sortSelect">
        <option value="">— Default order —</option>
        ${data.columns.map(c => `<option value="${escapeAttr(c)}" ${state.sortBy === c ? 'selected' : ''}>${c}</option>`).join('')}
      </select>
      <button class="sort-direction" id="sortDir" ${!state.sortBy ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}>
        ${state.sortDir === 'asc' ? '↑ A → Z' : '↓ Z → A'}
      </button>
      <div class="spacer"></div>
      <span class="result-count">
        ${state.query ? `<strong>${filtered.length}</strong> of ${data.rows.length}` : `<strong>${filtered.length}</strong> entries`}
      </span>
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="empty-title">No matches.</div>
        <div class="empty-sub">Try a different search term or clear the filter.</div>
      </div>
    ` : `
      <div class="grid">
        ${filtered.map((row, i) => renderCard(row, data.columns, i)).join('')}
      </div>
    `}
  `;
  document.getElementById('main').innerHTML = html;

  // Wire toolbar
  const sortSelect = document.getElementById('sortSelect');
  if (sortSelect) {
    sortSelect.addEventListener('change', e => {
      state.sortBy = e.target.value || null;
      render();
    });
  }
  const sortDirBtn = document.getElementById('sortDir');
  if (sortDirBtn) {
    sortDirBtn.addEventListener('click', () => {
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      render();
    });
  }

  // Wire cards
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => {
      const id = c.dataset.id;
      state.expandedRowId = state.expandedRowId === id ? null : id;
      render();
    });
  });
}

// ============================================================
// Render a single card
// ============================================================
function renderCard(row, columns, idx) {
  const titleCol = columns[0];
  const title = row[titleCol] || '';
  const id = `${state.activeTab}-${idx}-${title.slice(0, 20)}`.replace(/\s/g, '_');
  const isExpanded = state.expandedRowId === id;

  // The subtitle uses the second column (e.g., "Category" for Products, "Year" for Regs)
  const subtitleCol = columns[1];
  const subtitle = row[subtitleCol] || '';

  // Identify notes-type columns (longer text, render specially)
  const notesCols = columns.filter(c =>
    /note|mnemonic|trap|plain english|example|key power/i.test(c)
  );
  const regularCols = columns.slice(2).filter(c => !notesCols.includes(c));

  // For collapsed cards, only show first 3 regular fields + first note
  const visibleRegular = isExpanded ? regularCols : regularCols.slice(0, 3);
  const visibleNotes = isExpanded ? notesCols : notesCols.slice(0, 1);

  return `
    <div class="card ${isExpanded ? 'expanded' : ''}" data-id="${escapeAttr(id)}">
      <div class="card-title">${highlight(title)}</div>
      ${subtitle ? `<div class="card-subtitle">${highlight(subtitle)}</div>` : ''}
      <div class="card-fields">
        ${visibleRegular.map(col => renderField(col, row[col], false)).join('')}
        ${visibleNotes.map(col => renderField(col, row[col], true)).join('')}
        ${!isExpanded && (regularCols.length > 3 || notesCols.length > 1) ? `
          <div class="field-label" style="color: var(--ink-faint); font-size: 9px; padding-top: 6px;">
            CLICK TO EXPAND →
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function renderField(col, value, isNotes) {
  if (!value && value !== 0) return '';

  // Special handling for Memorized
  if (/memorized/i.test(col)) {
    const v = String(value).toLowerCase().trim();
    const isYes = v === 'yes' || v === 'true' || v === '✓';
    const display = isYes
      ? `<span class="memorized-yes">✓ Memorized</span>`
      : `<span class="memorized-no">○ Not yet</span>`;
    return `
      <div class="field is-memorized">
        <div class="field-label">${col}</div>
        <div class="field-value">${display}</div>
      </div>
    `;
  }

  return `
    <div class="field ${isNotes ? 'is-notes' : ''}">
      <div class="field-label">${col}</div>
      <div class="field-value">${highlight(String(value))}</div>
    </div>
  `;
}

// ============================================================
// Search + sort
// ============================================================
function filterAndSort(rows, columns) {
  let result = rows;

  if (state.query) {
    const q = state.query.toLowerCase();
    result = result.filter(row =>
      columns.some(c => String(row[c] || '').toLowerCase().includes(q))
    );
  }

  if (state.sortBy) {
    const col = state.sortBy;
    result = [...result].sort((a, b) => {
      const av = String(a[col] || '').toLowerCase();
      const bv = String(b[col] || '').toLowerCase();
      // Try numeric sort first
      const an = parseFloat(av.replace(/[^\d.-]/g, ''));
      const bn = parseFloat(bv.replace(/[^\d.-]/g, ''));
      if (!isNaN(an) && !isNaN(bn) && av.match(/^\$?\d/) && bv.match(/^\$?\d/)) {
        return state.sortDir === 'asc' ? an - bn : bn - an;
      }
      return state.sortDir === 'asc'
        ? av.localeCompare(bv)
        : bv.localeCompare(av);
    });
  }

  return result;
}

// ============================================================
// Highlight matches in search
// ============================================================
function highlight(text) {
  if (!state.query) return escapeHtml(text);
  const q = state.query;
  const escaped = escapeHtml(text);
  const re = new RegExp(`(${escapeRegex(q)})`, 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}
function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ============================================================
// Search wiring
// ============================================================
function setupSearch() {
  const input = document.getElementById('search');
  const clear = document.getElementById('searchClear');

  input.addEventListener('input', e => {
    state.query = e.target.value.trim();
    clear.classList.toggle('visible', !!state.query);
    render();
  });

  clear.addEventListener('click', () => {
    input.value = '';
    state.query = '';
    clear.classList.remove('visible');
    input.focus();
    render();
  });

  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      input.focus();
    } else if (e.key === 'Escape' && document.activeElement === input) {
      input.value = '';
      state.query = '';
      clear.classList.remove('visible');
      input.blur();
      render();
    } else if (/^[1-7]$/.test(e.key) && document.activeElement.tagName !== 'INPUT') {
      const idx = parseInt(e.key, 10) - 1;
      if (TAB_CONFIG[idx]) {
        state.activeTab = TAB_CONFIG[idx].key;
        state.query = '';
        input.value = '';
        clear.classList.remove('visible');
        state.expandedRowId = null;
        render();
      }
    }
  });
}

// ============================================================
// Init
// ============================================================
function init() {
  setupSearch();
  render();
}

loadData();
</script>
